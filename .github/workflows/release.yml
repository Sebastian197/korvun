# Release pipeline (ADR-0025, Stage 15). Build-time only: it runs GoReleaser on a
# pushed SemVer tag to produce the GitHub Release (binaries x6, checksums,
# archives, changelog, SBOM). Tags are pushed BY HAND — a tag pushed from inside
# an Action does not retrigger workflows, and the SemVer bump is a deliberate
# decision, not an automated one.
#
# A manual `workflow_dispatch` runs the SAME job as a `--snapshot` DRY-RUN
# (ADR-0026): it builds, signs checksums.txt with keyless cosign (real Fulcio/
# Rekor OIDC), and attests build provenance — exercising the id-token/signing/
# provenance path in the real Actions environment — but publishes NO GitHub
# Release and consumes NO tag (snapshot ignores the `release:` section). Used to
# validate the trust machinery before the first real tag.
name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Snapshot dry-run only (no release published, no tag consumed). Must stay true — a real release is published by pushing a v* tag.'
        type: boolean
        default: true

# Least privilege (Scorecard Token-Permissions, High): the default token is
# read-only for every job; the one job that needs write scopes elevates them at
# the job level, not here.
permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # Only the release job needs write scopes:
    permissions:
      contents: write # create the GitHub Release and upload its assets
      id-token: write # keyless cosign: mint an OIDC token to sign checksums.txt (ADR-0026)
      attestations: write # SLSA build provenance attestation for the checksums (ADR-0026)
    steps:
      # A manual dispatch is dry-run only: a real, published release must come
      # from a pushed v* tag (there is no tag context to publish on dispatch).
      - name: Guard — dispatch must be a dry-run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run != true
        run: |
          echo "::error::Manual dispatch supports dry_run=true only; publish a real release by pushing a v* tag."
          exit 1

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history so the changelog can diff from the previous tag

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Syft generates the per-release SBOM (ADR-0025 §6).
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # cosign signs checksums.txt keyless via the workflow OIDC identity (ADR-0026).
      # Pin the cosign BINARY to v2.6.3 (installer SHA stays v4.1.2): cosign v3
      # defaults to --new-bundle-format and DROPS the classic
      # --output-signature / --output-certificate outputs GoReleaser's `signs`
      # block relies on (verified locally against v3.0.6 — it errors "create
      # bundle file"; v2.6.3 produces the .sig/.pem GoReleaser expects). Moving to
      # the cosign v3 bundle format is a deferred modernization, not this release.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: v2.6.3

      # On a pushed tag: a real, published release. On manual dispatch: a
      # --snapshot dry-run (builds + signs + attests, publishes nothing). Snapshot
      # still runs the `signs:` block, so keyless cosign is exercised for real.
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # SLSA build provenance for the checksum file (ADR-0026 fast-follow). Signing
      # checksums.txt already covers integrity of every artifact transitively; this
      # attestation records HOW/WHERE it was built (SLSA Build L3 via OIDC), so the
      # single subject is the checksum file — no per-binary fan-out needed.
      #
      # Real releases only (tag push): GitHub CANNOT persist attestations for
      # user-owned PRIVATE repos ("Feature not available for user-owned private
      # repositories"), so it would fail a snapshot dry-run while the repo is
      # private. By the first real release the repo is public (Phase B flip
      # precedes the Phase C tag), where attestation works. A dispatch dry-run
      # attesting a throwaway snapshot checksum would be meaningless anyway.
      - name: Attest build provenance
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/checksums.txt