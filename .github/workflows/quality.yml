name: Quality Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  security-events: write

jobs:
  quality:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install tools
        shell: bash
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v1.64.8
          go install golang.org/x/tools/cmd/goimports@latest

      - name: Build
        run: go build ./...

      - name: Lint (fmt + vet + golangci-lint)
        shell: bash
        run: |
          echo "Checking gofmt..."
          test -z "$(gofmt -l .)" || { echo "Files need gofmt:"; gofmt -l .; exit 1; }
          echo "Checking goimports..."
          test -z "$($(go env GOPATH)/bin/goimports -l .)" || { echo "Files need goimports:"; $(go env GOPATH)/bin/goimports -l .; exit 1; }
          go vet ./...
          $(go env GOPATH)/bin/golangci-lint run ./...

      - name: Test
        run: go test -race ./...

      - name: Coverage gate
        shell: bash
        run: |
          set -euo pipefail
          CORE_MIN=85
          CRITICAL_MIN=90
          # Critical packages: each must be >= CRITICAL_MIN once it has
          # executable code. The `brain` package is intentionally NOT in
          # this list yet — Phase 3.1 ships it as an interface-only
          # forward slice of Stage 7 with no executable statements; it
          # will be re-added when Stage 7 implements a concrete brain.
          CRITICAL_PKGS="envelope policy router"

          if [ ! -d internal ] || [ -z "$(find internal -name '*.go' -print -quit 2>/dev/null)" ]; then
            echo "No internal/ packages yet — coverage gate vacuously satisfied"
            exit 0
          fi

          # No -coverpkg: every package measures its own statements, so
          # the per-package number in the log is the package's own
          # coverage. Adding -coverpkg=./internal/... dilutes each
          # package against the whole tree and breaks the per-package
          # gate.
          go test -race -coverprofile=coverage.out ./internal/... \
            | tee coverage-test.log

          if ! grep -q '^mode:' coverage.out 2>/dev/null \
             || ! grep -v '^mode:' coverage.out | grep -q '.' 2>/dev/null; then
            echo "FAIL: no coverage data produced for internal/ packages"
            exit 1
          fi

          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')
          echo "internal/ total coverage: ${total}%"
          if awk -v t="$total" -v m="$CORE_MIN" 'BEGIN { exit !(t+0 < m+0) }'; then
            echo "FAIL: internal/ total coverage ${total}% < ${CORE_MIN}%"
            exit 1
          fi

          fail=0
          for pkg in $CRITICAL_PKGS; do
            if [ ! -d "internal/$pkg" ]; then
              echo "skip: internal/$pkg (not present yet)"
              continue
            fi
            cov=$(awk -v p="internal/$pkg[[:space:]]" '
              $0 ~ p && /coverage:/ {
                for (i=1; i<=NF; i++) if ($i == "coverage:") { print $(i+1); exit }
              }' coverage-test.log | tr -d '%')
            if [ -z "${cov:-}" ]; then
              echo "FAIL: could not parse coverage for internal/$pkg"
              fail=1
              continue
            fi
            echo "internal/$pkg coverage: ${cov}%"
            if awk -v t="$cov" -v m="$CRITICAL_MIN" 'BEGIN { exit !(t+0 < m+0) }'; then
              echo "FAIL: internal/$pkg ${cov}% < ${CRITICAL_MIN}%"
              fail=1
            fi
          done
          exit $fail

      - name: SAST (gosec)
        shell: bash
        run: $(go env GOPATH)/bin/golangci-lint run --enable gosec ./...

      - name: Govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          $(go env GOPATH)/bin/govulncheck ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o /dev/null ./cmd/korvun

  codeql:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  sbom:
    runs-on: ubuntu-latest
    needs: quality
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          artifact-name: korvun-sbom.spdx.json
          upload-artifact: true
          upload-release-assets: false