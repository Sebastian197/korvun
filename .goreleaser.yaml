# GoReleaser release pipeline for Korvun (ADR-0025, Stage 15).
#
# Build-time only: GoReleaser is invoked by the release CI workflow on a pushed
# SemVer tag; it never enters go.mod. It cross-compiles the same six targets CI
# already verifies (linux/darwin/windows x amd64/arm64, CGO_ENABLED=0), produces
# SHA256 checksums, tar.gz/zip archives, a Conventional-Commits changelog, and a
# per-release SBOM (Syft). Signing / provenance / public release are Stage 16.
#
# Validate locally without publishing:  goreleaser release --snapshot --clean
# Schema:                               goreleaser check
version: 2

project_name: korvun

builds:
  - id: korvun
    main: ./cmd/korvun
    binary: korvun
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Inject the SemVer version into cmd/korvun/main.var version (ADR-0025 §2);
    # GoReleaser's {{ .Version }} strips the leading "v", so prefix it back to
    # match the documented `korvun vX.Y.Z` (and a snapshot prints vX.Y.Z-snapshot).
    # -s -w strip the symbol table and DWARF for a smaller binary.
    ldflags:
      - -s -w -X main.version=v{{ .Version }}

archives:
  - id: korvun
    # tar.gz everywhere except Windows, which gets a .zip.
    formats: ["tar.gz"]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    # Each archive bundles the binary plus the licence, readme, and a minimal,
    # valid starting config (validate with `korvun config check korvun.example.json`).
    files:
      - LICENSE
      - README.md
      - korvun.example.json

checksum:
  algorithm: sha256
  name_template: "checksums.txt"

# Sign checksums.txt with keyless cosign (Sigstore OIDC) — ADR-0026, Stage 16.
# One signature over the checksum file transitively verifies every artifact, so
# there is exactly one thing to sign and one thing to verify. Keyless means NO
# key management (no custody, rotation, or HSM): cosign mints an ephemeral
# certificate from the workflow's OIDC identity (release.yml grants
# `id-token: write`) and records it in the public Rekor transparency log.
#
# Skipped on `--snapshot` (no OIDC available locally); `goreleaser check`
# validates this config, and the real signing runs only in CI on a pushed tag.
#
# Verify a downloaded release:
#   cosign verify-blob checksums.txt \
#     --signature checksums.txt.sig \
#     --certificate checksums.txt.pem \
#     --certificate-identity-regexp 'https://github.com/Sebastian197/korvun/.*' \
#     --certificate-oidc-issuer https://token.actions.githubusercontent.com
signs:
  - cmd: cosign
    # ${signature} defaults to ${artifact}.sig; capture the ephemeral cert too.
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes" # non-interactive: no confirmation prompt in CI
    artifacts: checksum
    output: true

# One SBOM per archive (SPDX JSON via Syft), so every published artifact is
# self-describing (ADR-0025 §6). Requires `syft` on PATH (the release workflow
# installs it). Describes the build; signing/provenance/SLSA are Stage 16.
sboms:
  - id: korvun
    artifacts: archive

changelog:
  # `git` reads the local git log (no GitHub API), so it works on a private repo
  # and offline during --snapshot.
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: "Bug fixes"
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^refactor:'

snapshot:
  # Used by --snapshot (no tag): an unambiguous non-release version string.
  version_template: "{{ incpatch .Version }}-snapshot"

release:
  draft: false
  prerelease: auto
